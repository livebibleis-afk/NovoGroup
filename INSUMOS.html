<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Inventario Quirúrgico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #00843D; /* Verde clínico B. Braun */
            --bg-color: #f4f6f8;
            --text-dark: #2c3e50;
            --border-radius: 8px;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { 
            font-size: 1.5rem; 
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }
        /* Buscador */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(0, 132, 61, 0.3);
        }
        /* Contenedor responsivo para celulares */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            white-space: nowrap;
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #eee; 
            text-align: left; 
            font-size: 0.95rem;
        }
        th { 
            background-color: var(--primary); 
            color: white; 
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:hover { background-color: #f8fdfa; }
        .empty-state { text-align: center; padding: 30px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 Control de Insumos y Fluidoterapia</h1>
        
        <input type="text" id="searchInput" class="search-box" placeholder="Filtrar por lote, área (S1, S2, S3), producto..." onkeyup="filtrarTabla()">

        <div class="table-responsive">
            <table id="inventoryTable">
                <thead>
                    <tr id="table-head"></tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="8" class="empty-state">Sincronizando con la base de datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Enlace de exportación directa de tu Google Sheet en formato CSV
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1LU1JLO8M6QSYs3llsgRYC7Rw4_iWhKHPxu50fq4p8nM/export?format=csv';

        // Descarga y procesamiento de los datos
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                const headStr = document.getElementById('table-head');
                const bodyStr = document.getElementById('table-body');
                
                headStr.innerHTML = '';
                bodyStr.innerHTML = '';

                // Descartar filas completamente vacías del Excel
                const validData = data.filter(row => Object.values(row).some(val => val.trim() !== ''));

                if(validData.length > 0) {
                    // Generar nombres de columnas de forma dinámica
                    Object.keys(validData[0]).forEach(key => {
                        headStr.innerHTML += `<th>${key}</th>`;
                    });

                    // Insertar filas con los datos de las cajas
                    validData.forEach(row => {
                        let rowHtml = '<tr>';
                        Object.values(row).forEach(val => {
                            rowHtml += `<td>${val}</td>`;
                        });
                        rowHtml += '</tr>';
                        bodyStr.innerHTML += rowHtml;
                    });
                } else {
                    bodyStr.innerHTML = '<tr><td colspan="10" class="empty-state">No hay registros en la base de datos.</td></tr>';
                }
            },
            error: function(err) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="10" class="empty-state" style="color:red;">Error de conexión. Asegúrate de que el archivo de Sheets tenga el acceso general como "Cualquier persona con el enlace puede ver".</td></tr>';
            }
        });

        // Filtrado en tiempo real desde celulares o PC
        function filtrarTabla() {
            let input = document.getElementById("searchInput");
            let filter = input.value.toUpperCase();
            let table = document.getElementById("inventoryTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let showRow = false;
                let tds = tr[i].getElementsByTagName("td");
                for (let j = 0; j < tds.length; j++) {
                    if (tds[j]) {
                        let txtValue = tds[j].textContent || tds[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            showRow = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = showRow ? "" : "none";
            }
        }
    </script>
</body>
</html>
