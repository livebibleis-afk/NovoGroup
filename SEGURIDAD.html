<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte de Sedes</title>
    <style>
        :root {
            /* Modo día - Tonos bajos y suaves */
            --bg-gradient: linear-gradient(135deg, #b8c6db 0%, #f5f7fa 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --text-muted: #5d6d7e;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --toggle-bg: #2c3e50;
            --toggle-icon: '🌙';
        }

        [data-theme="dark"] {
            /* Modo oscuro - Tonos azules medios/oscuros */
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(20, 35, 65, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8f9f9;
            --text-muted: #bdc3c7;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --toggle-bg: #f8f9f9;
            --toggle-icon: '☀️';
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 30px;
        }

        /* Efecto Cristal (Glassmorphism) Apple Style */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .theme-toggle::after {
            content: var(--toggle-icon);
        }

        /* Tarjetas */
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            padding: 25px;
            overflow: hidden;
            position: relative;
        }

        .card-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .sede-title {
            color: #2980b9; 
            font-weight: 700;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        [data-theme="dark"] .sede-title {
            color: #5dade2;
        }

        .area-title {
            font-weight: 600;
            margin-top: 12px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.9rem;
        }

        [data-theme="dark"] .area-title {
            background: rgba(255,255,255,0.05);
        }

        ul {
            list-style-type: none;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(150, 150, 150, 0.15);
            font-size: 0.95rem;
            align-items: center;
        }

        li:last-child {
            border-bottom: none;
        }

        .role {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        .name {
            text-align: right;
            font-weight: 500;
            max-width: 60%;
        }

        /* Optimizaciones para teléfonos */
        @media (max-width: 480px) {
            li {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                padding: 12px 0;
            }
            .name {
                text-align: left;
                max-width: 100%;
                font-size: 1.05rem;
                padding-left: 10px;
                border-left: 2px solid #5dade2;
            }
            .role {
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>

        // ======= LÓGICA DE RENDERIZADO =======
        document.getElementById('report-title').textContent = database.titulo;
        
        const wrapper = document.getElementById('cards-wrapper');

        database.tarjetas.forEach(tarjeta => {
            let htmlCard = `<div class="card glass"><div class="card-header">${tarjeta.id}</div>`;

            tarjeta.sedes.forEach(sede => {
                htmlCard += `<div class="sede-title">✓ ${sede.nombre}</div>`;
                
                if (sede.areas) {
                    sede.areas.forEach(area => {
                        htmlCard += `<div class="area-title">${area.nombre}</div><ul>`;
                        area.personal.forEach(p => {
                            htmlCard += `<li><span class="role">${p.rol}</span> <span class="name">${p.nombres}</span></li>`;

                }

                if (sede.personal) {
                    htmlCard += `<ul>`;

                        htmlCard += `<li><span class="role">${p.rol}</span> <span class="name">${p.nombres}</span></li>`;

                }

            htmlCard += `</div>`;
            wrapper.innerHTML += htmlCard;
        });

        // ======= LÓGICA DE TEMA OSCURO/CLARO =======
        const btnToggle = document.getElementById('toggle-btn');
        const body = document.body;

        btnToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        });

</html>
