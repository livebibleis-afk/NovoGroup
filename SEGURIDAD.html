<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base de Datos - Personal</title>
    <style>
        :root {
            /* Modo día - Tonos bajos y suaves */
            --bg-gradient: linear-gradient(135deg, #d5dee7 0%, #e8edf3 100%);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #34495e;
            --text-muted: #5d6d7e;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --toggle-bg: #2c3e50;
            --toggle-icon: '🌙';
            --accent-color: #2980b9;
        }

        [data-theme="dark"] {
            /* Modo oscuro - Tonos azules medios/oscuros */
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(20, 35, 65, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8f9f9;
            --text-muted: #bdc3c7;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --toggle-bg: #f8f9f9;
            --toggle-icon: '☀️';
            --accent-color: #5dade2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 30px;
        }

        /* Efecto Cristal (Glassmorphism) */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .theme-toggle::after {
            content: var(--toggle-icon);
        }

        /* Cargando */
        .loader {
            text-align: center;
            padding: 40px;
            font-weight: 600;
            color: var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Tarjetas */
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            padding: 25px;
            overflow: hidden;
            position: relative;
        }

        .card-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        ul {
            list-style-type: none;
            margin-top: 10px;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(150, 150, 150, 0.15);
            font-size: 0.95rem;
            align-items: center;
        }

        li:last-child {
            border-bottom: none;
        }

        .role {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        .name {
            text-align: right;
            font-weight: 500;
            max-width: 60%;
        }

        /* Optimizaciones para teléfonos */
        @media (max-width: 480px) {
            li {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                padding: 12px 0;
            }
            .name {
                text-align: left;
                max-width: 100%;
                font-size: 1.05rem;
                padding-left: 10px;
                border-left: 2px solid var(--accent-color);
            }
            .role {
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="container">
        <header class="glass">
            <h1>Base de Datos - Personal</h1>
            <button class="theme-toggle" id="toggle-btn" aria-label="Cambiar tema"></button>
        </header>

        <div class="card-container" id="cards-wrapper">
            <div class="glass loader" id="loader">Conectando a Google Sheets...</div>
        </div>
    </div>

    <script>
        // Configuración de Google Sheets
        // Se usa tu ID de documento y se especifica la hoja "Personal"
        const sheetId = '10ZSuGpQnPEQTEp5v7FC9Ck44fV9ST4_HKDUipa74ZX4';
        const sheetName = 'Personal';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

        const wrapper = document.getElementById('cards-wrapper');

        // Función para obtener y pintar los datos
        fetch(url)
            .then(response => response.text())
            .then(text => {
                // Limpiar la respuesta de Google para obtener JSON válido
                const jsonStr = text.substring(47).slice(0, -2);
                const data = JSON.parse(jsonStr);
                
                const cols = data.table.cols.map(c => c ? c.label : '');
                
                // NUEVO CÓDIGO: Filtramos las filas para ignorar a "TOVAR, HENRRI JEOVANNY"
                const rows = data.table.rows.filter(row => {
                    // Verificamos si alguna celda de esta fila contiene el nombre
                    const hasTargetName = row.c.some(cell => 
                        cell && cell.v && String(cell.v).toUpperCase().includes('TOVAR, HENRRI JEOVANNY')
                    );
                    // Solo mantenemos la fila si NO tiene el nombre
                    return !hasTargetName;
                });

                let htmlContent = '';

                // Generar tarjetas dinámicamente basadas en las filas y columnas de tu Excel filtrado
                rows.forEach(row => {
                    // Tomamos la primera columna como Título Principal (ej. Nombre, Sede o ID)
                    const mainTitle = (row.c[0] && row.c[0].v !== null) ? row.c[0].v : 'Registro';
                    
                    let cardHtml = `<div class="card glass">
                                        <div class="card-header">${mainTitle}</div>
                                        <ul>`;
                    
                    // Las demás columnas se añaden como propiedades (Rol - Nombre)
                    for (let i = 1; i < cols.length; i++) {
                        if (row.c[i] && row.c[i].v !== null && row.c[i].v !== '') {
                            let columnHeader = cols[i] || `Dato ${i}`;
                            let cellValue = row.c[i].v;
                            cardHtml += `<li>
                                            <span class="role">${columnHeader}</span> 
                                            <span class="name">${cellValue}</span>
                                         </li>`;
                        }
                    }
                    cardHtml += `</ul></div>`;
                    htmlContent += cardHtml;
                });

                // Insertar en la página web
                if(htmlContent === '') {
                    wrapper.innerHTML = `<div class="glass loader">No se encontraron datos en la hoja "Personal". Verifica que tenga información.</div>`;
                } else {
                    wrapper.innerHTML = htmlContent;
                }
            })
            .catch(error => {
                console.error('Error cargando la base de datos:', error);
                wrapper.innerHTML = `<div class="glass loader" style="color: #e74c3c;">
                    Error al conectar con Google Sheets.<br><br>
                    Asegúrate de que el documento esté configurado como "Cualquier persona con el enlace puede leer".
                </div>`;
            });

        // Lógica de cambio de Modo Noche / Día
        const btnToggle = document.getElementById('toggle-btn');
        const body = document.body;

        btnToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        });
    </script>
</body>
</html>
