<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novo Clinic - Dashboard Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* (Mantengo todo tu CSS original sin cambios) */
        :root {
            --bg-color: #f4f6f9;
            --bg-overlay: rgba(244, 246, 249, 0.65);
            --text-color: #333333;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --header-bg: rgba(30, 58, 95, 0.95);
            --header-text: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.95);
            --input-bg: rgba(255, 255, 255, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.2);
            --admision-bg: #ffffff;
            --admision-text: #2c3e50;
            --admision-border: #cfd8dc;
        }
        [data-theme="dark"] {
            --bg-color: #121820;
            --bg-overlay: rgba(18, 24, 32, 0.85);
            --text-color: #e0e0e0;
            --glass-bg: rgba(20, 30, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --header-bg: rgba(15, 30, 50, 0.95);
            --card-hover: rgba(30, 45, 65, 0.9);
            --input-bg: rgba(20, 30, 45, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --admision-bg: #1a252f;
            --admision-text: #ecf0f1;
            --admision-border: #4b6584;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg-color); 
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('jardin.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 12px; }
        /* ... (el resto de tu CSS original se mantiene igual) ... */
    </style>
</head>
<body>

    <div class="no-print" id="main-interface">
        <header>
            <div class="header-title">
                <span id="main-title">Novo Clinic - Sábado 27-06-26</span>
            </div>
            <div class="header-controls">
                <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar paciente...">
                <button class="icon-btn" id="themeToggle" title="Modo Claro/Oscuro">🌗</button>
                <button class="icon-btn" id="copyWppBtn" title="Copiar Reporte WhatsApp">📱</button>
                <button class="icon-btn" id="printBtn" title="Imprimir Programación">🖨️</button>
            </div>
        </header>

        <main>
            <section id="cirugias-section">
                <div class="section-title">Programación Quirúrgica</div>
                <div id="cirugias-container"></div>
            </section>
        </main>
    </div>

    <!-- Modal de Registro (mantenido) -->
    <div id="registrationModal" class="modal"> ... (tu modal completo) ... </div>

    <script>
        const cirugias = [
            // SALA 1
            { sala: "SALA 1", hora: "05:00", paciente: "DORIS YAUYO", medico: "DR. PEDRO MANUEL VILLAGRA", procedimiento: "SIMPATECTOMIA", obs: "PREOP: PX TRAE ANESTESIOLOGO", h: "1 D" },
            { sala: "SALA 1", hora: "06:00", paciente: "SILVANA GARMAN", medico: "DR. PEDRO MANUEL VILLAGRA", procedimiento: "SIMPATECTOMIA", obs: "PREOP: PX TRAE ANESTESIOLOGO", h: "1 D" },
            { sala: "SALA 1", hora: "07:00", paciente: "THAILA JIMENEZ", medico: "DR. PEDRO MANUEL VILLAGRA", procedimiento: "SIMPATECTOMIA", obs: "PREOP: PX TRAE ANESTESIOLOGO", h: "1 D" },
            { sala: "SALA 1", hora: "08:00", paciente: "ANGELA SOTO", medico: "DR. PEDRO VALENCIA", procedimiento: "SIMPATECTOMIA", obs: "PREOP: PX TRAE ANESTESIOLOGO", h: "1 D" },
            { sala: "SALA 1", hora: "09:00", paciente: "DAYANNE GANDARILLAS", medico: "DR. PEDRO VALENCIA", procedimiento: "SIMPATECTOMIA", obs: "TRAE ANESTESIOLOGO", h: "D" },
            { sala: "SALA 1", hora: "13:00", paciente: "CORTEZ", medico: "DR. WASHINGTON PILCO JARA", procedimiento: "RTU", obs: "PREOP: DR 2H - 36 litros de Suero fisiológico, sonda foley 20-22 triple vía, xilocaina jalea, bolsa colectora", h: "R D" },
            { sala: "SALA 1", hora: "16:00", paciente: "VANESSA CASTILLO", medico: "DR. WALTER RODRIGUEZ ESTURDO VILLANUEVA", procedimiento: "LIFTING FACIAL", obs: "PREOP: PX TRAE ANESTESIOLOGO", h: "R D" },

            // SALA 2
            { sala: "SALA 2", hora: "04:00", paciente: "TRUJILLO FLORES DOMINGO", medico: "DR. ESTUARDO ANDRES RIOS CADENILLAS", procedimiento: "RTU", obs: "PREOP: PX TRAE", h: "2 H D R" },
            { sala: "SALA 2", hora: "", paciente: "ERIKA ESPINOZA", medico: "", procedimiento: "LIPOESCULTURA", obs: "HBT: PRIVADA - TRAE ANESTESIOLOGO", h: "" },

            // SALA 3
            { sala: "SALA 3", hora: "15:00", paciente: "MELANIE AGUILAR (31a)", medico: "DR. OSCAR EDUARDO FERNANDEZ GONZALES", procedimiento: "SAFENECTOMIA", obs: "PREOP: DR", h: "DR 2H" },
            { sala: "SALA 3", hora: "19:00", paciente: "CRISTINA VEGA MAÑUICO", medico: "DR. JUAN DAVID ESPINOZA BELTRAN", procedimiento: "RESECCION DE CONDUCTOS MAMARIOS", obs: "PREOP: DR", h: "DR 2H HBT: PRIVADA" }
        ];

        // Renderizado (mantengo tu lógica original adaptada)
        function renderCirugias(filtro = '') {
            const container = document.getElementById('cirugias-container');
            container.innerHTML = '';

            const searchLower = filtro.toLowerCase();
            const filtered = cirugias.filter(c => 
                (c.paciente || '').toLowerCase().includes(searchLower) ||
                (c.medico || '').toLowerCase().includes(searchLower) ||
                (c.procedimiento || '').toLowerCase().includes(searchLower)
            );

            const salas = {};
            filtered.forEach(c => {
                if (!salas[c.sala]) salas[c.sala] = [];
                salas[c.sala].push(c);
            });

            for (const [salaName, list] of Object.entries(salas)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'sala-group';
                groupDiv.innerHTML = `<div class="sala-title">${salaName}</div>`;

                const gridDiv = document.createElement('div');
                gridDiv.className = 'cards-grid';

                list.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'glass patient-card';
                    const copyData = `PACIENTE: ${c.paciente}\nHORA PROG.: ${c.hora}\nSALA: ${c.sala}\nMEDICO: ${c.medico}\nPROCEDIMIENTO: ${c.procedimiento}\nOBS: ${c.obs}\nH: ${c.h}`;

                    card.innerHTML = `
                        <div class="action-buttons-card">
                            <button class="card-action-btn copy-card-btn" data-clipboard="${encodeURIComponent(copyData)}" title="Copiar">📋</button>
                            <button class="card-action-btn" onclick="openRegistrationModal('${encodeURIComponent(JSON.stringify(c))}')" title="Registro">📝</button>
                        </div>
                        <div class="card-row"><div class="card-label">PACIENTE:</div><div class="card-value">${c.paciente}</div></div>
                        <div class="card-row"><div class="card-label">HORA PROG.:</div><div class="card-value">${c.hora || '—'}</div></div>
                        <div class="card-row"><div class="card-label">SALA:</div><div class="card-value">${c.sala}</div></div>
                        <div class="card-row"><div class="card-label">MEDICO:</div><div class="card-value">${c.medico}</div></div>
                        <div class="card-row"><div class="card-label">PROCEDIMIENTO:</div><div class="card-value">${c.procedimiento}</div></div>
                        <div class="card-row"><div class="card-label">OBS:</div><div class="card-value">${c.obs}</div></div>
                        <div class="card-row"><div class="card-label">H:</div><div class="card-value">${c.h || '—'}</div></div>
                    `;
                    gridDiv.appendChild(card);
                });
                groupDiv.appendChild(gridDiv);
                container.appendChild(groupDiv);
            }
        }

        // Inicialización
        window.onload = () => {
            renderCirugias();
            document.getElementById('searchInput').addEventListener('input', (e) => renderCirugias(e.target.value));
            // Agrega aquí el resto de tu script (theme, modal, etc.)
        };
    </script>
</body>
</html>
