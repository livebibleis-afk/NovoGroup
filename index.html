<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Clinic - Dashboard Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333333;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --header-bg: rgba(30, 58, 95, 0.85);
            --header-text: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.8);
            --input-bg: rgba(255, 255, 255, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.2);
        }

        [data-theme="dark"] {
            --bg-color: #121820;
            --text-color: #e0e0e0;
            --glass-bg: rgba(20, 30, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --header-bg: rgba(15, 30, 50, 0.9);
            --card-hover: rgba(30, 45, 65, 0.8);
            --input-bg: rgba(20, 30, 45, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 12px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--header-text);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            width: 250px;
            transition: width 0.3s;
        }

        .search-bar:focus {
            box-shadow: 0 0 0 2px #4a90e2;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--header-text);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: var(--btn-hover);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Main Container */
        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(150, 150, 150, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Section A: Programación Quirúrgica */
        .sala-group {
            margin-bottom: 25px;
        }

        .sala-title {
            font-size: 1.2rem;
            color: #4a90e2;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 15px;
        }

        .patient-card {
            padding: 15px;
            position: relative;
            transition: transform 0.2s, background 0.3s;
        }

        .patient-card:hover {
            transform: translateY(-3px);
            background: var(--card-hover);
        }

        .copy-card-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            padding: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .copy-card-btn:hover {
            background: #4a90e2;
            color: white;
        }

        .card-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .card-label {
            width: 145px;
            min-width: 145px;
            margin-right: 10px;
            word-break: break-word;
            font-weight: 600;
            color: #777;
        }
        
        [data-theme="dark"] .card-label {
            color: #aaa;
        }

        .card-value {
            flex: 1;
            font-weight: 500;
        }

        /* Section B: Oxígeno */
        .oxygen-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .oxygen-grid {
                grid-template-columns: 1fr 1fr;
            }
            .recuperacion-full {
                grid-column: 1 / -1;
            }
        }

        .oxy-category {
            padding: 20px;
        }

        .oxy-category h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #4a90e2;
        }

        .oxy-item {
            margin-bottom: 15px;
        }

        .oxy-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .progress-bg {
            background: rgba(150, 150, 150, 0.2);
            border-radius: 8px;
            height: 18px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .progress-empty {
            background: #ffe6e6 !important;
            border: 1px solid #ff4d4d;
        }

        .progress-empty .progress-text {
            color: #ff4d4d;
            font-weight: bold;
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 16px;
            text-shadow: none;
        }

        /* Widgets Reservas */
        .reserva-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .reserva-widget {
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reserva-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .reserva-val {
            font-size: 2rem;
            font-weight: 700;
        }

        .badge-alert {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            font-size: 0.7rem;
            padding: 3px 6px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .recuperacion-cols {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 768px) {
            .recuperacion-cols {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Print Layer */
        .print-only {
            display: none;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm;
            }
            body {
                background: white !important;
                color: black !important;
            }
            .no-print, header, .search-bar, .oxy-section {
                display: none !important;
            }
            .print-only {
                display: block;
            }
            .print-header {
                text-align: center;
                margin-bottom: 20px;
                border-bottom: 2px solid black;
                padding-bottom: 10px;
            }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 11pt;
            }
            .print-table th, .print-table td {
                border: 1px solid #000;
                padding: 6px;
                text-align: left;
            }
            .print-table th {
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold;
            }
            .sala-separator td {
                background-color: #e0e0e0 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <header>
            <div class="header-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
                <span id="main-title">Novo Clinic</span>
            </div>
            <div class="header-controls">
                <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar paciente, médico, procedimiento...">
                
                <button class="icon-btn" id="themeToggle" title="Modo Claro/Oscuro">
                    <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7c.17 0 .34.02.51.04C11.16 6.54 10 8.63 10 11c0 3.31 2.69 6 6 6 2.37 0 4.46-1.16 5.96-2.51.02.17.04.34.04.51 0 3.86-3.14 7-7 7z"/></svg>
                </button>
                
                <button class="icon-btn" id="copyWppBtn" title="Copiar Reporte WhatsApp">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                
                <button class="icon-btn" id="printBtn" title="Imprimir Programación">
                    <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                </button>
            </div>
        </header>

        <main>
            <section id="cirugias-section">
                <h2 class="section-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7H8v5H6v2h2v5h2v-5h2v-2z"/></svg>
                    Programación Quirúrgica
                </h2>
                <div id="cirugias-container"></div>
            </section>

            <section class="oxy-section" id="oxigeno-section">
                <h2 class="section-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM13 13h-2v3h-2v-3H7v-2h2V8h2v3h2v2z"/></svg>
                    Oxígeno Novo Clinic
                </h2>
                <div class="oxygen-grid" id="oxigeno-container"></div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast">Copiado al portapapeles</div>

    <div class="print-only">
        <div class="print-header">
            <h2>Programación Quirúrgica - Novo Clinic</h2>
            <p id="print-date"></p>
        </div>
        <table class="print-table" id="print-table">
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Médico</th>
                    <th>Paciente</th>
                    <th>Procedimiento</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody id="print-tbody"></tbody>
        </table>
    </div>

    <script>
        /*******************************************************
         * PARTE 1: LÓGICA DE RENDERIZADO, EVENTOS Y FUNCIONES *
         *******************************************************/
        
        // 1. Configuración Inicial y Temas
        const initTheme = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        };
        initTheme();

        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // 2. Fecha Actual
        const setDateHeaders = () => {
            const dateStr = new Date().toLocaleDateString('es-PE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('main-title').innerText = `Novo Clinic - ${dateStr}`;
            document.getElementById('print-date').innerText = `Fecha: ${dateStr}`;
        };
        setDateHeaders();

        // 3. Toast function
        const showToast = (message) => {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        };

        // 4. Lógica de Oxígeno (Colores y Barras)
        const getOxyStyles = (valStr) => {
            const val = parseInt(valStr) || 0;
            const isEmpty = val === 0 || valStr.trim() === '-';
            const width = isEmpty ? 0 : Math.min((val / 3000) * 100, 100);
            
            let bg = '';
            let color = '';
            if (isEmpty) {
                bg = 'transparent'; color = '#ff4d4d';
            } else if (val <= 799) {
                bg = 'linear-gradient(90deg, #ff4b1f 0%, #ff9068 100%)'; color = '#ffffff';
            } else if (val <= 1999) {
                bg = 'linear-gradient(90deg, #f7b733 0%, #fc4a1a 100%)'; color = '#000000';
            } else {
                bg = 'linear-gradient(90deg, #36D1DC 0%, #5B86E5 100%)'; color = '#ffffff';
            }
            return { width, bg, color, isEmpty };
        };

        // 5. Motor de Renderizado Principal
        function renderDashboard(cirugias, oxigeno, textoWpp) {
            
            // --- A) Render Programación Quirúrgica ---
            const renderCirugias = (filtro = '') => {
                const container = document.getElementById('cirugias-container');
                const printTbody = document.getElementById('print-tbody');
                container.innerHTML = '';
                printTbody.innerHTML = '';

                const searchLower = filtro.toLowerCase();
                const filtered = cirugias.filter(c => 
                    (c.paciente || '').toLowerCase().includes(searchLower) ||
                    (c.medico || '').toLowerCase().includes(searchLower) ||
                    (c.procedimiento || '').toLowerCase().includes(searchLower)
                );

                // Agrupar por Sala
                const salas = {};
                filtered.forEach(c => {
                    if (!salas[c.sala]) salas[c.sala] = [];
                    salas[c.sala].push(c);
                });

                for (const [salaName, list] of Object.entries(salas)) {
                    // UI Container
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'sala-group';
                    groupDiv.innerHTML = `<div class="sala-title">${salaName.toUpperCase()}</div>`;
                    
                    const gridDiv = document.createElement('div');
                    gridDiv.className = 'cards-grid';

                    // Print Separator
                    const sepTr = document.createElement('tr');
                    sepTr.className = 'sala-separator';
                    sepTr.innerHTML = `<td colspan="5">${salaName.toUpperCase()}</td>`;
                    printTbody.appendChild(sepTr);

                    list.forEach(c => {
                        // Construir Tarjeta
                        const card = document.createElement('div');
                        card.className = 'glass patient-card';
                        
                        const copyDataStr = `PACIENTE:\t${c.paciente}\nHORA PROG.:\t${c.hora}\nSALA:\t${c.sala}\nMEDICO:\t${c.medico}\nPROCEDIMIENTO:\t${c.procedimiento}\nOBS:\t${c.obs}\nH:\t${c.h}`;
                        
                        card.innerHTML = `
                            <button class="copy-card-btn" title="Copiar fila para Excel" data-clipboard="${encodeURIComponent(copyDataStr)}">📋</button>
                            <div class="card-row"><div class="card-label">PACIENTE:</div><div class="card-value">${c.paciente || '---'}</div></div>
                            <div class="card-row"><div class="card-label">HORA PROG.:</div><div class="card-value">${c.hora}</div></div>
                            <div class="card-row"><div class="card-label">SALA:</div><div class="card-value">${c.sala}</div></div>
                            <div class="card-row"><div class="card-label">MEDICO:</div><div class="card-value">${c.medico}</div></div>
                            <div class="card-row"><div class="card-label">PROCEDIMIENTO:</div><div class="card-value">${c.procedimiento}</div></div>
                            <div class="card-row"><div class="card-label">OBS:</div><div class="card-value">${c.obs}</div></div>
                            <div class="card-row"><div class="card-label">H:</div><div class="card-value">${c.h}</div></div>
                        `;
                        gridDiv.appendChild(card);

                        // Construir Fila de Impresión
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${c.hora}</td>
                            <td>${c.medico}</td>
                            <td>${c.paciente || ''}</td>
                            <td>${c.procedimiento}</td>
                            <td>${c.obs}</td>
                        `;
                        printTbody.appendChild(tr);
                    });

                    groupDiv.appendChild(gridDiv);
                    container.appendChild(groupDiv);
                }

                // Attach Events to internal copy buttons
                document.querySelectorAll('.copy-card-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const data = decodeURIComponent(this.getAttribute('data-clipboard'));
                        navigator.clipboard.writeText(data).then(() => {
                            this.innerHTML = '✅';
                            setTimeout(() => { this.innerHTML = '📋'; }, 1500);
                        });
                    });
                });
            };

            // Búsqueda en vivo
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderCirugias(e.target.value);
            });
            renderCirugias();

            // --- B) Render Estado de Oxígeno ---
            const renderOxyList = (list) => {
                return list.map(item => {
                    const style = getOxyStyles(item.val);
                    const emptyClass = style.isEmpty ? 'progress-empty' : '';
                    const displayVal = style.isEmpty ? '<span class="progress-text">VACÍO</span>' : item.val;
                    return `
                        <div class="oxy-item">
                            <div class="oxy-item-header">
                                <span>${item.label}</span>
                                <span style="color: ${style.color === '#ffffff' ? 'inherit' : style.color}">${item.val}</span>
                            </div>
                            <div class="progress-bg ${emptyClass}">
                                <div class="progress-bar" style="width: ${style.width}%; background: ${style.bg}; color: ${style.color}">${displayVal}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            const oxyContainer = document.getElementById('oxigeno-container');
            let oxyHtml = `
                <div class="glass oxy-category">
                    <h3>🛠️ Salas de Operaciones</h3>
                    ${renderOxyList(oxigeno.operaciones)}
                </div>
                <div class="glass oxy-category">
                    <h3>🩺 UCI & Nebulización</h3>
                    ${renderOxyList(oxigeno.uci)}
                </div>
                <div class="glass oxy-category recuperacion-full">
                    <h3>🛏️ Recuperación</h3>
                    <div class="recuperacion-cols">
                        ${renderOxyList(oxigeno.recuperacion)}
                    </div>
                </div>
                <div class="glass oxy-category">
                    <h3>🏥 Hospitalización</h3>
                    ${renderOxyList(oxigeno.hospitalizacion)}
                </div>
                <div class="glass oxy-category">
                    <h3>📦 Reservas de Gases</h3>
                    <div class="reserva-grid">
            `;

            oxigeno.reservas.forEach(r => {
                const needsBadge = r.val.includes('01') || r.val.includes('02');
                oxyHtml += `
                    <div class="glass reserva-widget">
                        ${needsBadge ? '<span class="badge-alert">¡ALERTA!</span>' : ''}
                        <div class="reserva-title">${r.label}</div>
                        <div class="reserva-val" style="color: ${needsBadge ? '#ff4d4d' : '#4a90e2'}">${r.val}</div>
                    </div>
                `;
            });

            oxyHtml += `</div></div>`;
            oxyContainer.innerHTML = oxyHtml;

            // --- C) Eventos Globales (WhatsApp e Impresión) ---
            document.getElementById('copyWppBtn').onclick = () => {
                navigator.clipboard.writeText(textoWpp).then(() => {
                    showToast('Reporte WhatsApp copiado');
                });
            };

            document.getElementById('printBtn').onclick = () => {
                window.print();
            };
        }

        /*******************************************************
         * PARTE 2: AÑADE TUS DATOS NUEVOS AQUÍ                *
         *******************************************************/

        // 1. REEMPLAZA ESTE ARREGLO CON LAS CIRUGÍAS DEL DÍA
