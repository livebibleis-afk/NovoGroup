<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novo Clinic - Dashboard Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333333;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --header-bg: rgba(30, 58, 95, 0.95);
            --header-text: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.9);
            --input-bg: rgba(255, 255, 255, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.2);
            --admision-bg: #ffffff;
            --admision-text: #2c3e50;
            --admision-border: #cfd8dc;
        }

        [data-theme="dark"] {
            --bg-color: #121820;
            --text-color: #e0e0e0;
            --glass-bg: rgba(20, 30, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --header-bg: rgba(15, 30, 50, 0.95);
            --card-hover: rgba(30, 45, 65, 0.8);
            --input-bg: rgba(20, 30, 45, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --admision-bg: #1a252f;
            --admision-text: #ecf0f1;
            --admision-border: #4b6584;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; min-height: 100vh; overflow-x: hidden; }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 12px; }

        /* HEADER */
        header { position: sticky; top: 0; z-index: 100; background: var(--header-bg); color: var(--header-text); padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .search-bar { padding: 10px 15px; border-radius: 20px; border: none; background: var(--input-bg); color: var(--text-color); outline: none; flex-grow: 1; min-width: 150px; }
        .icon-btn { background: transparent; border: none; color: var(--header-text); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; width: 40px; height: 40px; }
        .icon-btn:hover { background: var(--btn-hover); }

        /* DASHBOARD CONTENT */
        main { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; gap: 30px; }
        .section-title { font-size: 1.3rem; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid rgba(150, 150, 150, 0.2); display: flex; align-items: center; gap: 10px; }

        /* CARDS */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .patient-card { padding: 15px; position: relative; transition: transform 0.2s; }
        .action-buttons-card { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; }
        .card-action-btn { background: var(--bg-color); border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; padding: 6px; width: 32px; height: 32px; }

        /* MODAL Y FORMULARIO */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--admision-bg); color: var(--admision-text); margin: 2% auto; padding: 20px; width: 95%; max-width: 210mm; border-radius: 8px; position: relative; }
        
        .reg-form-control { width: 100%; border: none; border-bottom: 1px solid var(--admision-border); padding: 5px 0; font-size: 11pt; color: var(--admision-text); background: transparent; }
        
        /* IMPRESIÓN FORZADA (TELETRANSPORTACIÓN A A4) */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body, body * { visibility: hidden !important; }
            body.printing-modal, 
            body.printing-modal #registrationModal, 
            body.printing-modal #registrationModal * { visibility: visible !important; display: block !important; }
            
            #registrationModal { position: absolute; left: 0; top: 0; width: 210mm; height: 297mm; background: white !important; }
            .modal-content { width: 210mm !important; height: 297mm !important; padding: 10mm 15mm !important; margin: 0 !important; border: none !important; }
            .reg-actions-container, .close-btn, .reg-btn-copy-mini, .no-print { display: none !important; }
            .reg-form-control { border-bottom: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

    <script type="text/plain" id="datos-cirugias">
### SALA 1		
PACIENTE:	ROMULO NUÑEZ	
HORA PROG.:	10:00	
SALA:	S1	
MEDICO:	DR: ANTONIO LAHOUD VELAOCHAGA	
PROCEDIMIENTO:	BYPASS	
OBS:	PREOP: DR	
H:	2 H	
    </script>
    <script type="text/plain" id="datos-oxigeno">
📋 *REPORTE DE ESTADO DE OXÍGENO*
S1. *Sala 1:* 2600
    </script>

    <div id="main-interface">
        <header>
            <div class="header-title"><span id="main-title">Novo Clinic</span></div>
            <div class="header-controls">
                <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar...">
                <button class="icon-btn" id="themeToggle">🌙</button>
            </div>
        </header>
        <main>
            <div id="cirugias-container"></div>
            <div id="oxigeno-container"></div>
        </main>
    </div>

    <div id="registrationModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRegistrationModal()">&times;</span>
            <h1>Registro de Admisión</h1>
            <div class="reg-form-table">
                <input type="text" id="reg-input-paciente" class="reg-form-control" placeholder="Paciente">
                <input type="text" id="reg-input-medico" class="reg-form-control" placeholder="Médico">
                <input type="date" id="reg-calc-fecha-nac" class="reg-form-control" onchange="calculateAgeReg()">
                <button class="reg-btn-action reg-btn-print" onclick="printRegistration()">🖨️ Imprimir A4</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("registrationModal");

        function openRegistrationModal(encodedData) {
            let data = encodedData ? JSON.parse(decodeURIComponent(encodedData)) : {};
            document.querySelectorAll('.reg-form-control').forEach(i => i.value = '');
            if (data) {
                document.getElementById('reg-input-paciente').value = data.paciente || '';
                document.getElementById('reg-input-medico').value = data.medico || '';
            }
            modal.style.display = "block";
        }

        function closeRegistrationModal() { modal.style.display = "none"; document.body.classList.remove('printing-modal'); }

        function printRegistration() {
            document.body.classList.add('printing-modal');
            setTimeout(() => { window.print(); setTimeout(() => { document.body.classList.remove('printing-modal'); }, 1000); }, 100);
        }

        /* ...resto de funciones de renderizado... */
    </script>
</body>
</html>
