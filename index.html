<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novo Clinic - Dashboard Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===================================================================== */
        /* VARIABLES Y ESTILOS GLOBALES (DASHBOARD)                              */
        /* ===================================================================== */
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333333;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --header-bg: rgba(30, 58, 95, 0.95);
            --header-text: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.9);
            --input-bg: rgba(255, 255, 255, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.2);
            --admision-bg: #ffffff;
            --admision-text: #2c3e50;
            --admision-border: #cfd8dc;
        }

        [data-theme="dark"] {
            --bg-color: #121820;
            --text-color: #e0e0e0;
            --glass-bg: rgba(20, 30, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --header-bg: rgba(15, 30, 50, 0.95);
            --card-hover: rgba(30, 45, 65, 0.8);
            --input-bg: rgba(20, 30, 45, 0.9);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --admision-bg: #1a252f;
            --admision-text: #ecf0f1;
            --admision-border: #4b6584;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; min-height: 100vh; overflow-x: hidden; }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 12px; }

        /* HEADER DASHBOARD */
        header { position: sticky; top: 0; z-index: 100; background: var(--header-bg); color: var(--header-text); padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .search-bar { padding: 10px 15px; border-radius: 20px; border: none; background: var(--input-bg); color: var(--text-color); outline: none; flex-grow: 1; min-width: 150px; }
        .icon-btn { background: transparent; border: none; color: var(--header-text); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; width: 40px; height: 40px; }
        .icon-btn:hover { background: var(--btn-hover); }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; align-items: center; } .search-bar { width: 300px; flex-grow: 0; } .header-controls { justify-content: flex-end; } }

        /* MAIN DASHBOARD */
        main { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; gap: 30px; }
        .section-title { font-size: 1.3rem; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid rgba(150, 150, 150, 0.2); display: flex; align-items: center; gap: 10px; }

        /* CARDS CIRUGIAS */
        .sala-group { margin-bottom: 25px; }
        .sala-title { font-size: 1.1rem; color: #4a90e2; margin-bottom: 10px; font-weight: 600; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .patient-card { padding: 15px; position: relative; transition: transform 0.2s; }
        .patient-card:hover { transform: translateY(-2px); background: var(--card-hover); }
        .action-buttons-card { position: absolute; top: 10px; right: 10px; z-index: 2; display: flex; flex-direction: column; gap: 5px; }
        .card-action-btn { background: var(--bg-color); border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; padding: 6px; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text-color); width: 32px; height: 32px; }
        .card-action-btn:hover { background: #4a90e2; color: white; }
        .card-row { display: flex; margin-bottom: 6px; font-size: 0.9rem; }
        .card-label { width: 120px; min-width: 120px; margin-right: 10px; font-weight: 600; color: #777; }
        [data-theme="dark"] .card-label { color: #aaa; }
        .card-value { flex: 1; font-weight: 500; word-break: break-word; }

        /* OXIGENO */
        .oxygen-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .oxygen-grid { grid-template-columns: 1fr 1fr; } .recuperacion-full { grid-column: 1 / -1; } }
        .oxy-category { padding: 15px; }
        .oxy-category h3 { margin-bottom: 12px; font-size: 1.05rem; color: #4a90e2; }
        .oxy-item { margin-bottom: 12px; }
        .oxy-item-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500; }
        .progress-bg { background: rgba(150, 150, 150, 0.2); border-radius: 8px; height: 16px; width: 100%; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; border-radius: 8px; transition: width 0.5s ease-in-out; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .progress-empty { background: #ffe6e6 !important; border: 1px solid #ff4d4d; }
        .progress-empty .progress-text { color: #ff4d4d; position: absolute; width: 100%; text-align: center; text-shadow: none; }
        .reserva-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .reserva-widget { padding: 10px; text-align: center; position: relative; }
        .reserva-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .reserva-val { font-size: 1.5rem; font-weight: 700; }
        .badge-alert { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 8px; font-weight: bold; }
        .recuperacion-cols { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 768px) { .recuperacion-cols { grid-template-columns: 1fr 1fr; } }

        /* TOAST GENERAL */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 3000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ===================================================================== */
        /* ESTILOS DEL MODAL Y FORMULARIO DE ADMISIÓN                            */
        /* ===================================================================== */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
        .modal-content { background-color: var(--admision-bg); color: var(--admision-text); margin: 2% auto; padding: 20px; width: 95%; max-width: 210mm; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; transition: background-color 0.3s, color 0.3s; }
        .close-btn { position: absolute; right: 20px; top: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 10; }
        .close-btn:hover { color: var(--text-color); }

        .reg-header-table { display: table; width: 100%; border-bottom: 2px solid #00a896; padding-bottom: 12px; margin-bottom: 20px; }
        .reg-header-row { display: table-row; }
        .reg-header-cell-main { display: table-cell; vertical-align: bottom; }
        .reg-header-cell-side { display: table-cell; vertical-align: bottom; text-align: right; }
        .reg-header-cell-main h1 { margin: 0; font-size: 18pt; color: #028090; text-transform: uppercase; letter-spacing: 0.5px; }
        [data-theme="dark"] .reg-header-cell-main h1 { color: #00d2c4; }

        .reg-sala-box { display: inline-flex; align-items: center; border: 2px solid #028090; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 11pt; background-color: rgba(2, 128, 144, 0.1); }
        [data-theme="dark"] .reg-sala-box { border-color: #00d2c4; background-color: rgba(0, 210, 196, 0.1); }
        .reg-sala-box span { color: #028090; margin-right: 5px; }
        [data-theme="dark"] .reg-sala-box span { color: #00d2c4; }
        .reg-sala-box input { border: none; background: transparent; font-weight: bold; font-size: 11pt; width: 40px; color: var(--admision-text); text-align: center; outline: none; }

        .reg-actions-container { margin-bottom: 15px; text-align: right; }
        .reg-btn-action { color: white; border: none; padding: 8px 14px; border-radius: 4px; font-size: 9.5pt; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; margin-left: 10px; }
        .reg-btn-copy { background-color: #028090; }
        .reg-btn-print { background-color: #ff9f43; }
        .reg-btn-action span { margin-right: 6px; font-size: 11pt; }

        .reg-btn-copy-mini { background: none; border: none; color: #028090; cursor: pointer; font-size: 11pt; padding: 2px 6px; margin-left: 5px; border-radius: 3px; display: inline-block; vertical-align: middle; }
        [data-theme="dark"] .reg-btn-copy-mini { color: #00d2c4; }

        .reg-dni-section { display: table; width: 100%; margin-bottom: 25px; }
        .reg-dni-row { display: table-row; }
        .reg-dni-col { display: table-cell; width: 50%; }
        .reg-dni-col:first-child { padding-right: 10px; }
        .reg-dni-col:last-child { padding-left: 10px; }
        .reg-dni-card { border: 2px dashed #b2bec3; border-radius: 8px; aspect-ratio: 1.58 / 1; position: relative; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        [data-theme="dark"] .reg-dni-card { border-color: #4b6584; }
        .reg-dni-card.has-image { border: 2px solid transparent; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.18); }
        .reg-dni-card input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .reg-dni-label { display: block; font-size: 9.5pt; color: #636e72; font-weight: 500; }
        [data-theme="dark"] .reg-dni-label { color: #d1d8e0; }
        .reg-dni-label span { display: block; font-size: 8pt; color: #b2bec3; margin-top: 4px; }
        .reg-dni-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100
