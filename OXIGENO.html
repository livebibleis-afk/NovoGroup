<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Oxígeno - Novo Clinic</title>
    <style>
        /* ========================================================
           ESTILOS VISUALES
           ======================================================== */
        :root {
            --bg-default: #f4f6f9;
            --header-bg: #1e3a5f;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 4px 12px rgba(203, 213, 225, 0.4);
            --widget-bg: #f8fafc;
            --bar-bg: #f1f5f9;
            --empty-bg: #fee2e2;
        }

        [data-theme="dark"] {
            --bg-default: #0f172a;
            --header-bg: #1e293b;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --widget-bg: #0f172a;
            --bar-bg: #334155;
            --empty-bg: #7f1d1d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-default);
            color: var(--text-main);
            padding-bottom: 40px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header {
            background: var(--header-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            transition: background-color 0.3s ease;
        }

        header h1 { font-size: 1.4rem; font-weight: 700; text-transform: uppercase;}

        .header-controls { display: flex; gap: 10px; }

        .btn-action {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-icon { padding: 8px 12px; font-size: 1.1rem; }

        .oxygen-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .oxygen-grid { grid-template-columns: repeat(2, 1fr); }
            .span-full { grid-column: span 2; }
            .recuperacion-split { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .oxygen-item { margin-bottom: 15px; }
        .oxygen-item:last-child { margin-bottom: 0; }

        .oxygen-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .item-label { display: flex; align-items: center; gap: 8px; }

        .btn-copy-small {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-copy-small:hover { opacity: 1; transform: scale(1.1); }
        .btn-copy-small:active { transform: scale(0.9); }

        .bar-bg {
            height: 18px;
            background: var(--bar-bg);
            border-radius: 9px;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .bar-fill {
            height: 100%;
            border-radius: 9px;
            transition: width 0.8s ease;
        }

        .text-empty { color: #ef4444; font-weight: 700; letter-spacing: 1px; }
        .bg-empty { background: var(--empty-bg); width: 100%; justify-content: center; }
        
        .text-red { color: #ef4444; }
        .bg-red { background: linear-gradient(90deg, #ef4444, #f87171); }

        .text-yellow { color: #ca8a04; }
        [data-theme="dark"] .text-yellow { color: #facc15; }
        .bg-yellow { background: linear-gradient(90deg, #eab308, #facc15); }

        .text-blue { color: #0ea5e9; }
        [data-theme="dark"] .text-blue { color: #38bdf8; }
        .bg-blue { background: linear-gradient(90deg, #3b82f6, #0ea5e9); }

        .widgets-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .widget {
            background: var(--widget-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 20px 10px;
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .w-label { 
            font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px;
            display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .w-val { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #1e293b; color: #fff; padding: 12px 24px;
            border-radius: 8px; opacity: 0; transform: translateY(10px);
            transition: 0.3s; pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        [data-theme="dark"] .toast { background: #f8fafc; color: #0f172a; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; opacity: 0; }

        @media print {
            body { background: #ffffff !important; color: #000000 !important; padding: 0; }
            .container { max-width: 100%; padding: 0; }
            header { background: #ffffff !important; color: #000000 !important; box-shadow: none; border: none; border-bottom: 2px solid #000; padding: 0 0 15px 0; border-radius: 0;}
            header h1 { color: #000000 !important; font-size: 1.5rem; }
            .header-controls, .btn-copy-small, .toast { display: none !important; }
            .card { box-shadow: none !important; border: 1px solid #cbd5e1 !important; break-inside: avoid; }
            .bar-bg, .bg-empty, .bar-fill, .bg-red, .bg-yellow, .bg-blue {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>REPORTE DE OXÍGENO - Novo Clinic</h1>
            <div class="header-controls">
                <button class="btn-action btn-icon" onclick="window.print()" title="Imprimir Reporte">🖨️</button>
                <button class="btn-action btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Alternar Modo Oscuro">🌙</button>
                <button class="btn-action" onclick="copyFullText()">📋 Copiar Todo</button>
            </div>
        </header>

        <div class="oxygen-grid" id="main-grid"></div>
    </div>

    <textarea id="raw-text" class="visually-hidden">📋 *REPORTE DE ESTADO DE OXÍGENO*
🏥 *Novo Clinic*

🛠️ *SALAS DE OPERACIONES*
S1. *Sala 1:* 1800
S2. *Sala 2:* 1900
S3. *Sala 3:* 1600

🛏️ *RECUPERACIÓN*
Rb. *Pto. B:* 700
Re. *Pto. C:* 1900
Re. *Pto. e:* 1400

🏥 *UCI & NEBULIZACIÓN*
Ca1. *Cama A1:* 1600
Cb1. *Cama b1:* -
Neb. *Nebulizar:* 500

🏥 *HOSPITALIZACIÓN*
General: 1300

📦 *RESERVAS DE GASES*
▫️ *Reserva O2:* *07UND*
▫️ *RESERVA CO2:* *02 UND*</textarea>

    <div id="toast" class="toast">✅ ¡Copiado al portapapeles!</div>

    <script>
        /* =========================================================================
           ZONA DE EDICIÓN 2: DATOS VISUALES DEL PANEL DE BARRAS
           ========================================================================= */
        const MAX = 3000;
        const data = {
            salas: [
                { tag: "S1. Sala 1", val: 1800 },
                { tag: "S2. Sala 2", val: 1900 },
                { tag: "S3. Sala 3", val: 1600 }
            ],
            uci: [
                { tag: "Ca1. Cama A1", val: 1600 },
                { tag: "Cb1. Cama b1", val: 0, isNull: true }, 
                { tag: "Neb. Nebulizar", val: 500 }
            ],
            recuperacion: [
                { tag: "Rb. Pto. B", val: 700 },
                { tag: "Re. Pto. C", val: 1900 },
                { tag: "Re. Pto. e", val: 1400 }
            ],
            hospitalizacion: [
                { tag: "General", val: 1300 }
            ],
            reservas: [
                { gas: "Reserva O2", qty: "07 UND" },
                { gas: "RESERVA CO2", qty: "02 UND" }
            ]
        };

        /* =========================================================================
           FUNCIONES DEL DASHBOARD Y REPARACIÓN DEL CÓDIGO
           ========================================================================= */

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("tema_oxigeno");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
                document.getElementById("theme-toggle").textContent = "☀️";
            }
            renderDashboard(); 
        });

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            if (isDark) {
                document.documentElement.removeAttribute("data-theme");
                localStorage.setItem("tema_oxigeno", "light");
                document.getElementById("theme-toggle").textContent = "🌙";
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                localStorage.setItem("tema_oxigeno", "dark");
                document.getElementById("theme-toggle").textContent = "☀️";
            }
        }

        // Función reconstruida y completada
        function getBar(item) {
            let copyText = item.isNull || item.val === 0 ? `${item.tag}: VACÍO` : `${item.tag}: ${item.val}`;

            if (item.isNull || item.val === 0) {
                return `
                <div class="oxygen-item">
                    <div class="oxygen-meta">
                        <div class="item-label">${item.tag} <button class="btn-copy-small" onclick="copyIndividualText('${copyText}')" title="Copiar">📋</button></div>
                        <span class="text-empty">VACÍO</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill bg-empty"></div></div>
                </div>`;
            }

            let percentage = (item.val / MAX) * 100;
            if (percentage > 100) percentage = 100;

            let colorClass = "bg-blue";
            let textClass = "text-blue";

            // Lógica de colores por nivel (puedes ajustarlo si cambian tus umbrales)
            if (item.val <= 500) { colorClass = "bg-red"; textClass = "text-red"; }
            else if (item.val <= 1000) { colorClass = "bg-yellow"; textClass = "text-yellow"; }

            return `
            <div class="oxygen-item">
                <div class="oxygen-meta">
                    <div class="item-label">${item.tag} <button class="btn-copy-small" onclick="copyIndividualText('${copyText}')" title="Copiar">📋</button></div>
                    <span class="${textClass}">${item.val}</span>
                </div>
                <div class="bar-bg"><div class="bar-fill ${colorClass}" style="width: ${percentage}%"></div></div>
            </div>`;
        }

        // Función para renderizar el panel principal
        function renderDashboard() {
            const grid = document.getElementById("main-grid");
            let html = "";

            html += `
                <div class="card span-full">
                    <h3>🛠️ Salas de Operaciones</h3>
                    <div class="recuperacion-split">
                        <div>
                            ${getBar(data.salas[0])}
                            ${getBar(data.salas[1])}
                        </div>
                        <div>
                            ${getBar(data.salas[2])}
                        </div>
                    </div>
                </div>`;

            html += `<div class="card"><h3>🛏️ Recuperación</h3>`;
            data.recuperacion.forEach(item => html += getBar(item));
            html += `</div>`;

            html += `<div class="card"><h3>🏥 UCI & Nebulización</h3>`;
            data.uci.forEach(item => html += getBar(item));
            html += `</div>`;

            html += `<div class="card"><h3>🏥 Hospitalización</h3>`;
            data.hospitalizacion.forEach(item => html += getBar(item));
            html += `</div>`;

            html += `<div class="card"><h3>📦 Reservas de Gases</h3><div class="widgets-container">`;
            data.reservas.forEach(item => {
                html += `<div class="widget"><div class="w-label">${item.gas}</div><div class="w-val">${item.qty}</div></div>`;
            });
            html += `</div></div>`;

            grid.innerHTML = html;
        }

        function copyFullText() {
            const textToCopy = document.getElementById("raw-text").value;
            copyToClipboard(textToCopy);
        }

        function copyIndividualText(text) {
            copyToClipboard(text);
        }

        function copyToClipboard(str) {
            navigator.clipboard.writeText(str).then(() => {
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2500);
            }).catch(err => {
                console.error("No se pudo copiar el texto: ", err);
            });
        }
    </script>
</body>
</html>
