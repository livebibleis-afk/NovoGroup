<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Oxígeno - Novo Clinic</title>
    <style>
        :root {
            --bg-default: #f4f6f9;
            --header-bg: #1e3a5f;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 4px 12px rgba(203, 213, 225, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-default);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header {
            background: var(--header-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            box-shadow: var(--shadow);
        }

        header h1 { font-size: 1.4rem; font-weight: 700; text-transform: uppercase;}

        .btn-copy {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-copy:hover { background: rgba(255, 255, 255, 0.3); }

        .oxygen-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .oxygen-grid { grid-template-columns: repeat(2, 1fr); }
            .span-full { grid-column: span 2; }
            .recuperacion-split { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .oxygen-item { margin-bottom: 15px; }
        .oxygen-item:last-child { margin-bottom: 0; }

        .oxygen-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .bar-bg {
            height: 18px;
            background: #f1f5f9;
            border-radius: 9px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .bar-fill {
            height: 100%;
            border-radius: 9px;
            transition: width 0.8s ease;
        }

        /* Colores */
        .text-empty { color: #ef4444; font-weight: 700; letter-spacing: 1px; }
        .bg-empty { background: #fee2e2; width: 100%; justify-content: center; }
        
        .text-red { color: #ef4444; }
        .bg-red { background: linear-gradient(90deg, #ef4444, #f87171); }

        .text-yellow { color: #ca8a04; }
        .bg-yellow { background: linear-gradient(90deg, #eab308, #facc15); }

        .text-blue { color: #0ea5e9; }
        .bg-blue { background: linear-gradient(90deg, #3b82f6, #0ea5e9); }

        /* Widgets Reservas */
        .widgets-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .widget {
            background: #f8fafc;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 20px 10px;
            text-align: center;
        }
        .w-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px;}
        .w-val { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #1e293b; color: #fff; padding: 12px 24px;
            border-radius: 8px; opacity: 0; transform: translateY(10px);
            transition: 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; opacity: 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>REPORTE DE ESTADO DE OXÍGENO - Novo Clinic</h1>
            <button class="btn-copy" onclick="copyText()">📋 Copiar para WhatsApp</button>
        </header>

        <div class="oxygen-grid" id="main-grid">
            </div>
    </div>

    <textarea id="raw-text" class="visually-hidden">📋 *REPORTE DE ESTADO DE OXÍGENO*
🏥 *Novo Clinic*

🛠️ *SALAS DE OPERACIONES*
S1. *Sala 1:* 1400
S2. *Sala 2:* 1900
S3. *Sala 3:* 2900

🛏️ *RECUPERACIÓN*
Rb. *Pto. B:* 600
Re. *Pto. E:* 1500
Re. *Pto. G:* 900

🏥 *UCI & NEBULIZACIÓN*
Ca1. *Cama A1:* 1600
Cb1. *Cama b1:* -
Neb. *Nebulizar:* 600

🏥 *HOSPITALIZACIÓN*: 3000
📦 *RESERVAS DE GASES*
▫️ *Reserva O2:* *04UND*
▫️ *RESERVA CO2:* *02 UND*</textarea>

    <div id="toast" class="toast">✅ ¡Reporte copiado!</div>

    <script>
        const MAX = 3000;
        const data = {
            salas: [
                { tag: "S1. Sala 1", val: 1400 },
                { tag: "S2. Sala 2", val: 1900 },
                { tag: "S3. Sala 3", val: 2900 }
            ],
            uci: [
                { tag: "Ca1. Cama A1", val: 1600 },
                { tag: "Cb1. Cama b1", val: 0, isNull: true },
                { tag: "Neb. Nebulizar", val: 600 }
            ],
            recuperacion: [
                { tag: "Rb. Pto. B", val: 600 },
                { tag: "Re. Pto. E", val: 1500 },
                { tag: "Re. Pto. G", val: 900 }
            ],
            hospitalizacion: [
                { tag: "Hospitalización", val: 3000 }
            ],
            reservas: [
                { gas: "Reserva O2", qty: "04 UND" },
                { gas: "RESERVA CO2", qty: "02 UND" }
            ]
        };

        function getBar(item) {
            if (item.isNull || item.val === 0) {
                return `<div class="oxygen-item">
                    <div class="oxygen-meta"><span>${item.tag}</span><span class="text-empty">VACÍO</span></div>
                    <div class="bar-bg bg-empty"><span class="text-empty" style="font-size:0.75rem;">VACÍO</span></div>
                </div>`;
            }
            let pct = (item.val / MAX) * 100;
            let c = "blue";
            if (item.val < 800) c = "red";
            else if (item.val < 2000) c = "yellow";

            return `<div class="oxygen-item">
                <div class="oxygen-meta"><span>${item.tag}</span><span class="text-${c}">${item.val} / ${MAX}</span></div>
                <div class="bar-bg"><div class="bar-fill bg-${c}" style="width: ${pct}%"></div></div>
            </div>`;
        }

        document.getElementById("main-grid").innerHTML = `
            <div class="card">
                <h3>🛠️ Salas de Operaciones</h3>
                ${data.salas.map(getBar).join('')}
            </div>
            <div class="card">
                <h3>🏥 UCI & Nebulización</h3>
                ${data.uci.map(getBar).join('')}
            </div>
            <div class="card span-full">
                <h3>🛏️ Recuperación</h3>
                <div class="recuperacion-split">
                    <div>${data.recuperacion.slice(0,2).map(getBar).join('')}</div>
                    <div>${data.recuperacion.slice(2).map(getBar).join('')}</div>
                </div>
            </div>
            <div class="card">
                <h3>🏥 Hospitalización</h3>
                ${data.hospitalizacion.map(getBar).join('')}
            </div>
            <div class="card">
                <h3>📦 Reservas de Gases</h3>
                <div class="widgets-container">
                    ${data.reservas.map(w => `<div class="widget"><div class="w-label">${w.gas}</div><div class="w-val">${w.qty}</div></div>`).join('')}
                </div>
            </div>
        `;

        function copyText() {
            navigator.clipboard.writeText(document.getElementById("raw-text").value).then(() => {
                let t = document.getElementById("toast");
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            });
        }
    </script>
</body>
</html>
