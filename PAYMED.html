<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Facturador - Clínica</title>
    <style>
        :root {
            --primary-blue: #1b365d;
            --secondary-blue: #2c5ba1;
            --light-blue: #a3c9ea;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .dashboard, .preview-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .dashboard {
            flex: 1 1 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }
        .preview-container {
            flex: 2 1 500px;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-x: auto;
        }
        h2 { color: var(--primary-blue); margin-top: 0; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"], input[type="date"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        select {
            background-color: #fff;
            cursor: pointer;
        }
        .readonly-input {
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            cursor: not-allowed;
            margin-top: 8px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
        }
        .checkbox-group input {
            cursor: pointer;
            width: auto;
        }
        
        /* Estilos del Recibo */
        .recibo {
            border: 1px solid #ddd;
            padding: 40px;
            position: relative;
            background: white;
            min-width: 500px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--secondary-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-blue);
        }
        .logo span { color: var(--secondary-blue); }
        .contact-info {
            font-size: 14px;
            color: var(--primary-blue);
            font-weight: bold;
            text-align: right;
            line-height: 1.4;
        }
        .recibo-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            text-decoration: underline;
        }
        .data-row {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .data-row strong {
            display: inline-block;
            width: 120px;
        }
        .amount-box {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
        }
        .signature-line {
            margin-top: 60px;
            border-top: 1px solid black;
            width: 300px;
            padding-top: 10px;
        }
        .print-btn {
            background-color: var(--secondary-blue);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .print-btn:hover { background-color: var(--primary-blue); }
        
        /* Estilo del Logo del Digitador */
        .digitador-logo {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #666;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }

        /* Diseño Responsivo (Móviles y Tablets) */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                flex-direction: column;
                align-items: center;
            }
            .dashboard, .preview-container {
                max-width: 100%;
                width: 100%;
                padding: 20px;
            }
            .recibo {
                padding: 20px;
                min-width: 400px;
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .contact-info {
                text-align: center;
            }
        }

        /* Reglas de Impresión */
        @media print {
            body * { visibility: hidden; }
            .preview-container, .preview-container * { visibility: visible; }
            .preview-container { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; overflow: visible; }
            .recibo { border: none; padding: 0; min-width: auto; width: 100%; }
            .print-btn, .digitador-logo, .dashboard { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Generador de Recibos</h2>
        
        <div class="form-group">
            <label>Seleccionar Sede (Predeterminados):</label>
            <select id="selectSede">
                <option value="novoclinic">NovoClinic (San Isidro)</option>
                <option value="novoq">Novo Q</option>
                <option value="novointegral">Novo Integral</option>
                <option value="novocentral">Novo Central</option>
                <option value="personalizado">-- Personalizado / Otro --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nombre de la Clínica:</label>
            <input type="text" id="inputClinica" value="NovoClinic">
        </div>
        <div class="form-group">
            <label>Dirección:</label>
            <input type="text" id="inputDireccion" value="Av. Salaverry 2671, San Isidro">
        </div>
        <div class="form-group">
            <label>Teléfono:</label>
            <input type="text" id="inputTelefono" value="961205510">
        </div>
        <div class="form-group">
            <label>Fecha:</label>
            <input type="date" id="inputFecha">
        </div>
        <div class="form-group">
            <label>Procedimiento / Pago:</label>
            <input type="text" id="inputPago" value="CONSULTA MÉDICA GENERAL">
        </div>
        <div class="form-group">
            <label>Paciente:</label>
            <input type="text" id="inputPaciente" value="ANA MARÍA ROJAS">
        </div>
        <div class="form-group">
            <label>DNI del Paciente:</label>
            <input type="text" id="inputDni" placeholder="Ej: 70123456">
        </div>
        <div class="form-group">
            <label>Doctor:</label>
            <input type="text" id="inputDoctor" value="DR. CARLOS MENDOZA ALVARADO">
        </div>
        <div class="form-group">
            <label>Monto Base (S/.):</label>
            <input type="number" step="0.01" id="inputMonto" value="150.00">
        </div>
        
        <div class="form-group">
            <label>Comisión Digitador:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="checkComision">
                <label for="checkComision">Aplicar e incrementar 5%</label>
            </div>
            <input type="text" id="inputComision" class="readonly-input" placeholder="S/. 0.00" readonly>
        </div>
        
        <button class="print-btn" onclick="window.print()">Imprimir Recibo</button>

        <div class="digitador-logo">
            BvankOs Power By Jeshua Él Mesías
        </div>
    </div>

    <div class="preview-container">
        <div class="recibo">
            <div class="header">
                <div class="logo" id="outClinica">NovoClinic</div>
                <div class="contact-info">
                    <span id="outDireccion">Av. Salaverry 2671, San Isidro</span> / <span id="outTelefono">961205510</span>
                </div>
            </div>
            
            <div style="text-align: right; font-weight: bold; margin-bottom: 20px;">
                FECHA: <span id="outFecha"></span>
            </div>
            
            <div class="recibo-title">RECIBO DE PAGO</div>
            
            <div class="data-row">
                <strong>PAGO:</strong> <span id="outPago">CONSULTA MÉDICA GENERAL</span>
            </div>
            <div class="data-row">
                <strong>PACIENTE:</strong> <span id="outPaciente">ANA MARÍA ROJAS</span>
            </div>
            <div class="data-row">
                <strong>DNI:</strong> <span id="outDni"></span>
            </div>
            <div class="data-row">
                <strong>DR:</strong> <span id="outDoctor">DR. CARLOS MENDOZA ALVARADO</span>
            </div>
            
            <div class="amount-box">
                MONTO DE S/. <span id="outMonto">150.00</span> SOLES
            </div>
            
            <div class="signature-line">
                NOMBRE:<br><br>
                DNI:
            </div>
        </div>
    </div>

    <script>
        // Base de datos interna de las Sedes
        const datosSedes = {
            novoclinic: {
                nombre: "NovoClinic",
                direccion: "Av. Salaverry 2671, San Isidro",
                telefono: "961205510"
            },
            novoq: {
                nombre: "Novo Q",
                direccion: "Av. de las Artes Sur 193, Lima 15036",
                telefono: "+51 932 262 486"
            },
            novointegral: {
                nombre: "Novo Integral",
                direccion: "Av. Brasil 2862, Pueblo Libre 15084",
                telefono: "992 169 343"
            },
            novocentral: {
                nombre: "Novo Central",
                direccion: "Av. Arequipa 1800, Lince 15046",
                telefono: "993 685 298"
            }
        };

        // Configurar la fecha de hoy automáticamente
        const fechaInput = document.getElementById('inputFecha');
        const hoy = new Date();
        const year = hoy.getFullYear();
        const month = String(hoy.getMonth() + 1).padStart(2, '0');
        const day = String(hoy.getDate()).padStart(2, '0');
        
        fechaInput.value = `${year}-${month}-${day}`;
        document.getElementById('outFecha').innerText = `${day}/${month}/${year}`;

        // Lógica del selector de Sedes
        document.getElementById('selectSede').addEventListener('change', function(e) {
            const sedeSeleccionada = datosSedes[e.target.value];
            if (sedeSeleccionada) {
                document.getElementById('inputClinica').value = sedeSeleccionada.nombre;
                document.getElementById('inputDireccion').value = sedeSeleccionada.direccion;
                document.getElementById('inputTelefono').value = sedeSeleccionada.telefono;
                
                // Actualizar la vista del recibo de inmediato
                document.getElementById('outClinica').innerText = sedeSeleccionada.nombre.toUpperCase();
                document.getElementById('outDireccion').innerText = sedeSeleccionada.direccion;
                document.getElementById('outTelefono').innerText = sedeSeleccionada.telefono;
            }
        });

        // Función principal de cálculo financiero
        function actualizarMontos() {
            const aplicarComision = document.getElementById('checkComision').checked;
            const montoBase = parseFloat(document.getElementById('inputMonto').value) || 0;
            
            let comisionVal = 0;
            let montoFinal = montoBase;

            if (aplicarComision) {
                comisionVal = montoBase * 0.05;
                montoFinal = montoBase + comisionVal;
                document.getElementById('inputComision').value = "S/. " + comisionVal.toFixed(2);
            } else {
                document.getElementById('inputComision').value = ""; 
            }

            document.getElementById('outMonto').innerText = montoFinal.toFixed(2);
        }

        // Eventos para controlar la comisión y el monto base
        document.getElementById('checkComision').addEventListener('change', actualizarMontos);
        document.getElementById('inputMonto').addEventListener('input', actualizarMontos);

        // Eventos para actualización en tiempo real cuando se escribe a mano
        document.getElementById('inputClinica').addEventListener('input', function(e) {
            document.getElementById('outClinica').innerText = e.target.value.toUpperCase();
            document.getElementById('selectSede').value = "personalizado"; // Cambia a personalizado si el usuario edita
        });

        document.getElementById('inputDireccion').addEventListener('input', function(e) {
            document.getElementById('outDireccion').innerText = e.target.value;
            document.getElementById('selectSede').value = "personalizado";
        });

        document.getElementById('inputTelefono').addEventListener('input', function(e) {
            document.getElementById('outTelefono').innerText = e.target.value;
            document.getElementById('selectSede').value = "personalizado";
        });

        // Actualización en tiempo real para textos generales del paciente/procedimiento
        const camposTexto = ['Fecha', 'Pago', 'Paciente', 'Dni', 'Doctor'];
        
        camposTexto.forEach(id => {
            document.getElementById(`input${id}`).addEventListener('input', function(e) {
                let val = e.target.value;
                
                if (id === 'Fecha') {
                    const partes = val.split('-');
                    if(partes.length === 3) val = `${partes[2]}/${partes[1]}/${partes[0]}`;
                }

                document.getElementById(`out${id}`).innerText = val.toUpperCase();
            });
        });

        // Inicialización al cargar la página por primera vez
        actualizarMontos();
        document.getElementById('outClinica').innerText = document.getElementById('inputClinica').value.toUpperCase();
    </script>
</body>
</html>
