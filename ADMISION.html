<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Admisión Quirúrgica</title>
    <style>
        /* Estilos Base y Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --input-bg: #f9f9f9;
            --accent-color: #007bff;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --input-bg: #2c2c2c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: background-color 0.3s;
        }

        /* Thumb-friendly Buttons */
        button {
            padding: 15px 25px;
            font-size: 16px;
            min-width: 140px;
            margin: 10px 5px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-color);
            color: white;
            cursor: pointer;
        }

        /* Inputs */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid #666;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Registro de Admisión Quirúrgica</h1>

    <button onclick="toggleModo()">🌙 Modo Oscuro</button>

    <form id="form-admision">
        <label>H. Ingreso:</label>
        <input type="time" id="hora-ingreso">

        <label>Paciente:</label>
        <input type="text" id="nombre-paciente">

        <label>Médico Tratante:</label>
        <input type="text" id="medico">

        <button type="button" onclick="window.print()">🖨️ Imprimir A4</button>
    </form>

    <script>
        // 1. Fecha y Hora Automática al cargar
        window.onload = function() {
            const ahora = new Date();
            const hora = ahora.getHours().toString().padStart(2, '0');
            const min = ahora.getMinutes().toString().padStart(2, '0');
            document.getElementById('hora-ingreso').value = `${hora}:${min}`;
            
            // Cargar datos guardados en LocalStorage
            document.querySelectorAll('input, textarea').forEach(input => {
                if(localStorage.getItem(input.id)) {
                    input.value = localStorage.getItem(input.id);
                }
            });
        };

        // 2. Guardar en LocalStorage al escribir
        document.querySelectorAll('input, textarea').forEach(input => {
            input.addEventListener('input', () => {
                localStorage.setItem(input.id, input.value);
            });
        });

        // 3. Lógica Modo Oscuro
        function toggleModo() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Aplicar modo oscuro al cargar si estaba activado
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
