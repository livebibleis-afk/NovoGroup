<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Admisión Quirúrgica</title>
    <style>
        /* ... (tus estilos originales se mantienen) ... */
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f5f7fa; color: #2c3e50; transition: background-color 0.3s, color 0.3s; }
        
        /* Aumentamos tamaño de botones para Thumb-friendly */
        .btn-action { color: white; border: none; padding: 15px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; margin: 5px; min-width: 140px; justify-content: center; }
        
        .a4-container { width: 210mm; margin: 20px auto; background-color: #ffffff; padding: 20mm 15mm; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        .form-control { width: 100%; border: none; border-bottom: 1px solid #cfd8dc; padding: 10px; font-size: 16px; /* Mejor para móvil */ }
        
        /* Estilos Modo Oscuro simplificados */
        body.dark-mode { background-color: #0f171e; color: #ecf0f1; }
        body.dark-mode .a4-container { background-color: #1a252f; }
        body.dark-mode .form-control { background: #2c3e50; color: white; border-bottom-color: #4b6584; }
    </style>
</head>
<body>

<div id="toast-msg" class="toast">📋 Guardado/Copiado</div>

<div class="a4-container">
    <h1>Registro de Admisión Quirúrgica</h1>
    <div class="actions-container">
        <button class="btn-action" style="background-color: #34495e;" onclick="toggleDarkMode()">🌙 Modo Oscuro</button>
        <button class="btn-action" style="background-color: #028090;" onclick="copyAllPatientData()">📋 Copiar Todo</button>
        <button class="btn-action" style="background-color: #ff9f43;" onclick="window.print()">🖨️ Imprimir</button>
    </div>

    <div class="form-table">
        <div class="form-row">
            <div class="form-label">H. Ingreso:</div>
            <input type="text" id="input-h-ingreso" class="form-control">
        </div>
        <div class="form-row">
            <div class="form-label">Paciente:</div>
            <input type="text" id="input-paciente" class="form-control">
        </div>
        </div>
</div>

<script>
    // 1. Hora automática y Carga de datos al iniciar
    window.onload = function() {
        const hIngreso = document.getElementById('input-h-ingreso');
        if (!hIngreso.value) {
            const ahora = new Date();
            hIngreso.value = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
        }

        // Cargar desde LocalStorage
        document.querySelectorAll('input, textarea').forEach(input => {
            const savedValue = localStorage.getItem(input.id);
            if (savedValue) input.value = savedValue;
        });
    };

    // 2. Guardado automático (LocalStorage)
    document.querySelectorAll('input, textarea').forEach(input => {
        input.addEventListener('input', () => {
            localStorage.setItem(input.id, input.value);
        });
    });

    // 3. Funciones de Modo Oscuro y otras...
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }
    
    // (Mantén aquí tus funciones de copySingleValue y copyAllPatientData originales)
</script>
</body>
</html>
