<!DOCTYPE html>
<html lang=""es"">
<head>
    <meta charset=""UTF-8"">
    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0"">
    <title>Visor de Planos Integrados - Proyecto Maestro</title>
    <style>
        /* Estilos del Sistema Web (Dashboard) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #2c3e50;
            overflow: hidden;
        }

        /* Panel Lateral de Controles */
        #panel-control {
            width: 320px;
            background-color: #1a252f;
            color: #ecf0f1;
            padding: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.5);
            overflow-y: auto;
            z-index: 10;
        }

        #panel-control h2 {
            font-size: 18px;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #34495e;
            color: #3498db;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botones / Checkboxes */
        .layer-control {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background-color: #2c3e50;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-left: 4px solid transparent;
        }

        .layer-control:hover {
            background-color: #34495e;
            border-left: 4px solid #3498db;
        }

        .layer-control input[type=""checkbox""] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }

        .layer-control span {
            font-size: 14px;
            font-weight: 600;
        }

        /* Cuadros de Color en la Leyenda del Menú */
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-right: 12px;
            display: inline-block;
        }

        /* Contenedor principal del Plano SVG */
        #visor-plano {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
            background-color: #e2e6ea;
        }

        /* Ajustes del SVG para la pantalla */
        svg {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- PANEL DE CONTROL LATERAL (MENÚ)            -->
    <!-- ========================================== -->
    <div id=""panel-control"">
        <h2>Arquitectura y Base</h2>

        <label class=""layer-control"">

        <label class=""layer-control"">

            <div class=""color-box"" style=""background-color: #1b5e20;""></div>

            <span>Textos y Leyenda General</span>

    <!-- MOTOR JAVASCRIPT: Lógica de Interacción    -->

    <script>
        function toggleLayer(layerId) {
            // Se captura el elemento SVG usando su ID
            const capa = document.getElementById(layerId);
            
            // Si la capa existe en el plano, alternamos su visibilidad
            if (capa) {
                if (capa.style.display === ""none"") {
                    capa.style.display = """"; // Se enciende la capa
                } else {
                    capa.style.display = ""none""; // Se apaga la capa
                }
            } else {
                console.error(""Error: No se encontró la capa con el ID "" + layerId);
            }
        }
    </script>
